<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cave du Rezhin</title>
  <meta name="theme-color" content="#191510" />
  <link rel="manifest" href="manifest.json" />
  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cave" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #191510; }
    body { padding-top: env(safe-area-inset-top); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // Persistance : shim window.storage -> localStorage (meme API que l'artefact Claude)
    window.storage = {
      async get(k) { const v = localStorage.getItem(k); return v == null ? null : { value: v }; },
      async set(k, v) { localStorage.setItem(k, v); },
    };
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
